name: Book Wrexham custom tee

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Exact tee date to book, YYYY-MM-DD. Recommended for custom runs."
        required: false
        type: string
      target_days_ahead:
        description: "Used only if target_date is blank. Example: 7."
        required: false
        default: "7"
        type: string
      booking_days:
        description: "Allowed run weekday(s) when booking-window protection is on, e.g. Sun, Tue, Thu."
        required: true
        default: "Sun"
        type: string
      primary_time:
        description: "First tee time to try, HH:MM."
        required: true
        default: "07:50"
        type: string
      secondary_time:
        description: "Optional fallback tee time, HH:MM. Leave blank for none."
        required: false
        type: string
      player_names:
        description: "Names separated by comma, semicolon, newline, or |. First player is the member."
        required: true
        default: "Verrol Skerritt, Richard Roberts, Dean Holmes, Eddie Buckley"
        type: string
      dry_run:
        description: "Run without submitting the final booking."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      require_booking_window:
        description: "Require the configured 18:30-19:05 Europe/London booking window."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      wait_for_login:
        description: "Wait until login_at before logging in."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      login_at:
        description: "Europe/London login time, HH:MM."
        required: true
        default: "18:59"
        type: string
      wait_for_1900:
        description: "Wait until 19:00 Europe/London before attempting to book."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      course_id:
        description: "Wrexham course id."
        required: true
        default: "779"
        type: string
      group_id:
        description: "Wrexham booking group id."
        required: true
        default: "1"
        type: string
      booking_edit_id:
        description: "Optional existing booking edit id to finish partner details."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: wrexham-custom-${{ github.event.inputs.target_date || github.run_id }}-${{ github.event.inputs.primary_time }}
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Europe/London
      BOOKING_URL: https://www.wrexhamgolfclub.co.uk/memberbooking/
      LOGIN_URL: https://www.wrexhamgolfclub.co.uk/login.php
      PRIMARY_TEE_TIME: ${{ github.event.inputs.primary_time }}
      SECONDARY_TEE_TIME: ${{ github.event.inputs.secondary_time }}
      PLAYER_NAMES: ${{ github.event.inputs.player_names }}
      COURSE_ID: ${{ github.event.inputs.course_id }}
      GROUP_ID: ${{ github.event.inputs.group_id }}
      REQUIRE_BOOKING_WINDOW: ${{ github.event.inputs.require_booking_window }}
      BOOKING_WEEKDAYS: ${{ github.event.inputs.booking_days }}
      TARGET_DAYS_AHEAD: ${{ github.event.inputs.target_days_ahead }}
      WAIT_FOR_LOGIN: ${{ github.event.inputs.wait_for_login }}
      LOGIN_AT: ${{ github.event.inputs.login_at }}
      WAIT_FOR_1900: ${{ github.event.inputs.wait_for_1900 }}
      TARGET_DATE: ${{ github.event.inputs.target_date }}
      BOOKING_EDIT_ID: ${{ github.event.inputs.booking_edit_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      IG_MEMBER_ID: ${{ secrets.IG_MEMBER_ID }}
      IG_PIN: ${{ secrets.IG_PIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Show selected booking inputs
        shell: bash
        run: |
          echo "Target date: ${TARGET_DATE:-days-ahead:$TARGET_DAYS_AHEAD}"
          echo "Booking window days: $BOOKING_WEEKDAYS"
          echo "Preferred times: $PRIMARY_TEE_TIME ${SECONDARY_TEE_TIME:+then $SECONDARY_TEE_TIME}"
          echo "Players: $PLAYER_NAMES"
          echo "Dry run: $DRY_RUN"
          echo "Require booking window: $REQUIRE_BOOKING_WINDOW"
          echo "Wait for login: $WAIT_FOR_LOGIN at $LOGIN_AT"
          echo "Wait for 19:00: $WAIT_FOR_1900"
          echo "Existing booking edit id: ${BOOKING_EDIT_ID:-none}"

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Book tee
        shell: bash
        run: npm run book

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booking-run-artifacts
          path: artifacts/
          if-no-files-found: ignore
