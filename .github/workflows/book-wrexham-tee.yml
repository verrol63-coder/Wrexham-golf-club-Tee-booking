name: Book Wrexham Sunday tee

on:
  schedule:
        # GitHub schedules use UTC and are NOT guaranteed to fire on time - a
        # scheduled run on 2026-07-12 fired at 21:10 BST instead of 18:00 BST,
        # over 3 hours late, causing both preferred tee times to be taken
        # before the bot even logged in. Triggering much earlier (13:00 UTC /
        # 14:00 BST) gives a large buffer: even a multi-hour GitHub delay
        # should still land well before the 18:59 BST login target. The
        # script's own internal clock-wait (WAIT_FOR_LOGIN/WAIT_FOR_1900)
        # handles the precise timing once the job is actually running.
        - cron: "0 13 * * 0"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional target date, YYYY-MM-DD. Blank means the Sunday 7 days ahead for scheduled Sunday runs."
        required: false
        type: string
      dry_run:
        description: "Run without submitting the final booking"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: wrexham-sunday-tee-booking
  cancel-in-progress: true

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      TZ: Europe/London
      BOOKING_URL: https://www.wrexhamgolfclub.co.uk/memberbooking/
      LOGIN_URL: https://www.wrexhamgolfclub.co.uk/login.php
      PRIMARY_TEE_TIME: "07:50"
      SECONDARY_TEE_TIME: "08:30"
      FALLBACK_WINDOW_START: "07:00"
      FALLBACK_WINDOW_END: "09:30"
      PLAYER_NAMES: "Verrol Skerritt|Richard Roberts|Dean Holmes|Eddie Buckley"
      COURSE_ID: "779"
      GROUP_ID: "1"
      REQUIRE_BOOKING_WINDOW: "false"
      BOOKING_WEEKDAYS: "Sun"
      TARGET_DAYS_AHEAD: "7"
      WAIT_FOR_LOGIN: "true"
      LOGIN_AT: "18:59"
      WAIT_FOR_1900: "true"
      TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      IG_MEMBER_ID: ${{ secrets.IG_MEMBER_ID }}
      IG_PIN: ${{ secrets.IG_PIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Book tee
        shell: bash
        run: npm run book

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booking-run-artifacts
          path: artifacts/
          if-no-files-found: ignore
