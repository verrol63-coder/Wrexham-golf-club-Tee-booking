name: Book Wrexham Tuesday 30 June 07:30 now

on:
  push:
    paths:
      - .github/booking-requests/tuesday-2026-06-30-now.txt

permissions:
  contents: read

concurrency:
  group: wrexham-tuesday-2026-06-30-0730-now
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Europe/London
      BOOKING_URL: https://www.wrexhamgolfclub.co.uk/memberbooking/
      LOGIN_URL: https://www.wrexhamgolfclub.co.uk/login.php
      PRIMARY_TEE_TIME: "07:30"
      SECONDARY_TEE_TIME: ""
      PLAYER_NAMES: "Verrol Skerritt"
      COURSE_ID: "779"
      GROUP_ID: "1"
      REQUIRE_BOOKING_WINDOW: "false"
      BOOKING_WEEKDAYS: "Tue"
      TARGET_DAYS_AHEAD: "7"
      WAIT_FOR_LOGIN: "true"
      LOGIN_AT: "18:59"
      WAIT_FOR_1900: "true"
      TARGET_DATE: "2026-06-30"
      DRY_RUN: "false"
      IG_MEMBER_ID: ${{ secrets.IG_MEMBER_ID }}
      IG_PIN: ${{ secrets.IG_PIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Book tee
        shell: bash
        run: npm run book

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booking-run-artifacts
          path: artifacts/
          if-no-files-found: ignore
