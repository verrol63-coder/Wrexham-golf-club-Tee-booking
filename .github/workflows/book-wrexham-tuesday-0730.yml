name: Book Wrexham Tuesday 07:30 tee

on:
  schedule:
    # GitHub schedules use UTC. These two entries cover 18:35 Europe/London
    # during both BST and GMT; the script exits unless local time is in-window.
    - cron: "35 17 * * 2"
    - cron: "35 18 * * 2"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional target date, YYYY-MM-DD. Blank means 7 days ahead for scheduled runs."
        required: false
        type: string
      dry_run:
        description: "Run without submitting the final booking"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: wrexham-tuesday-0730-tee-booking
  cancel-in-progress: true

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Europe/London
      BOOKING_URL: https://www.wrexhamgolfclub.co.uk/memberbooking/
      LOGIN_URL: https://www.wrexhamgolfclub.co.uk/login.php
      PRIMARY_TEE_TIME: "07:30"
      SECONDARY_TEE_TIME: ""
      PLAYER_NAMES: "Verrol Skerritt"
      COURSE_ID: "779"
      GROUP_ID: "1"
      REQUIRE_BOOKING_WINDOW: "true"
      BOOKING_WEEKDAYS: "Tue"
      TARGET_DAYS_AHEAD: "7"
      WAIT_FOR_LOGIN: "true"
      LOGIN_AT: "18:59"
      WAIT_FOR_1900: "true"
      TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      IG_MEMBER_ID: ${{ secrets.IG_MEMBER_ID }}
      IG_PIN: ${{ secrets.IG_PIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Book tee
        shell: bash
        run: npm run book

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booking-run-artifacts
          path: artifacts/
          if-no-files-found: ignore
