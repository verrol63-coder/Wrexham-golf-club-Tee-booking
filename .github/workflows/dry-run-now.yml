name: Dry run Wrexham login check

on:
  push:
    paths:
      - ".github/workflows/dry-run-now.yml"
      - ".github/dry-run-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dry-run:
    runs-on: ubuntu-latest
    environment: Wrexham-golf-club-Tee-booking
    timeout-minutes: 15
    env:
      TZ: Europe/London
      BOOKING_URL: https://www.wrexhamgolfclub.co.uk/memberbooking/
      LOGIN_URL: https://www.wrexhamgolfclub.co.uk/login.php
      PRIMARY_TEE_TIME: "07:50"
      SECONDARY_TEE_TIME: "08:30"
      PLAYER_NAMES: "Verrol Skerritt|Richard Roberts|Dean Holmes|Eddie Buckly"
      COURSE_ID: "779"
      GROUP_ID: "1"
      REQUIRE_BOOKING_WINDOW: "false"
      WAIT_FOR_LOGIN: "false"
      WAIT_FOR_1900: "false"
      DRY_RUN: "true"
      IG_MEMBER_ID: ${{ secrets.IG_MEMBER_ID }}
      IG_PIN: ${{ secrets.IG_PIN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository with built-in git
        shell: bash
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Show runtime versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: npm install

      - name: Install Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run dry-run login and booking screen check
        shell: bash
        run: |
          set +e
          mkdir -p artifacts dry-run-results
          npm run book > artifacts/run.log 2>&1
          status=$?

          {
            echo "Dry run timestamp UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Trigger SHA: $GITHUB_SHA"
            echo "Exit status: $status"
            echo
            if grep -q "Dry run reached the booking screen" artifacts/run.log; then
              echo "Result: SUCCESS - login worked and the booking screen was reached. No final booking was submitted."
            elif grep -q "Missing IG_MEMBER_ID secret" artifacts/run.log; then
              echo "Result: FAILURE - IG_MEMBER_ID is still missing or unavailable to this environment."
            elif grep -q "Missing IG_PIN secret" artifacts/run.log; then
              echo "Result: FAILURE - IG_PIN is still missing or unavailable to this environment."
            elif grep -q "Member login did not succeed" artifacts/run.log; then
              echo "Result: FAILURE - credentials were supplied but member login did not succeed."
            elif grep -q "visitor tee-time login" artifacts/run.log; then
              echo "Result: FAILURE - site showed the visitor tee-time login instead of the member booking flow."
            elif grep -q "CAPTCHA\|security check" artifacts/run.log; then
              echo "Result: FAILURE - a CAPTCHA or security check appeared."
            else
              echo "Result: FAILURE - dry run did not reach the booking screen. See sanitized log excerpt below."
            fi
            echo
            echo "Sanitized log excerpt:"
            sed -E 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/[email-redacted]/g; s/[0-9]{5,}/[number-redacted]/g' artifacts/run.log | tail -80
          } > dry-run-results/latest.txt

          exit 0

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booking-run-artifacts
          path: artifacts/
          if-no-files-found: ignore

      - name: Commit dry-run result
        if: always()
        shell: bash
        run: |
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "No checked-out commit is available; skipping dry-run result publish."
            exit 0
          fi

          if [ ! -f dry-run-results/latest.txt ]; then
            mkdir -p dry-run-results
            {
              echo "Dry run timestamp UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              echo "Trigger SHA: $GITHUB_SHA"
              echo "Exit status: checkout-or-setup-failed"
              echo
              echo "Result: FAILURE - workflow did not create a dry-run result file before the commit step."
            } > dry-run-results/latest.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dry-run-results/latest.txt
          git commit -m "Record dry-run login check result" || exit 0
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
